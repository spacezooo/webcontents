<!DOCTYPE html>
<html>
    <head><meta charset="utf-8">
        <title>relative 배치</title>
        <style>
            div{
                display: inline-block;
                position: absolute;
                border: 1px solid lightgray;
            }
            div>p{
                display: inline-block;
                position: absolute;
                height: 20px;
                width: 15px;
                background: lightgray;
            }
        </style>
    </head>
    <body>
        <h3>예수님이 탄생하셨습니다</h3>
        <div>
            <img src="media/tree.jpg" width="200" height="200" alt="크리스마스 트리">
            <p style="left: 50px; top: 30px;">M</p>
            <p style="left: 100px; top: 0px;">E</p>
            <p style="left: 100px; top: 80px;">R</p>
            <p style="left: 150px; top: 110px;">R</p>
            <p style="left: 30px; top: 130px;">Y</p>
        </div>
    </body>
</html>
