<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="utf-8">
        <title>색 테이블 만들기</title>
        <style>
            #brown{
                background-color: brown;
                width: 50px;
                height: 50px;
            }
            #deepskyblue{
                background-color: deepskyblue;
                width: 50px;
                height: 50px;
            }
            #blueviolet{
                background-color: blueviolet;
                width: 50px;
                height: 50px;
            }
            #gold{
                background-color: gold;
                width: 50px;
                height: 50px;
            }
            #darkorange{
                background-color: darkorange;
                width: 50px;
                height: 50px;
            }
            #olivedrab{
                background-color: olivedrab;
                width: 50px;
                height: 50px;
            }
        </style>
    </head>
    <body>
        <h3>색 이름과 코드</h3>
        <hr>
        <table border="1">
            <thead>
                <tr><th>이름</th><th>코드</th><th>색</th><th>이름</th><th>코드</th><th>색</th></tr>
            </thead>
            <tbody>
                <tr><th>Brown</th><th>#A52A2A</th><th><div id="brown"></div></th><th>DeepSkyblue</th><th>#00BFFF</th><th><div id="deepskyblue"></div></th></tr>
                <tr><th>Blueviolet</th>#8A2BE2<th></th><div id="Blueviolet"></div></th><th>Gold</th><th>#FFD700</th><th><div id="Gold"></div></th></tr>
                <tr><th>DarkOrange</th>#FF8Coo<th></th><div id="darkorange"></div></th><th>OliveDrab</th><th>#6B8E23</th><th><div id="olivedrab"></div></th></tr>
            </tbody>
        </table>
        
    </body>
</html>
