<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>전환</title>
        <style>

            @keyframes bob {
                0% { transform: rotate(-90deg); }
                50% { transform: rotate(90deg); }
                100% { transform: rotate(-90deg); }
            }
            

            .rotating-image {
                animation-name: bob;
                animation-duration: 1s;           
                animation-iteration-count: infinite; 
            }
        </style>
    </head>
    <body>
        <h3>어지러워요</h3>
        <hr>
        <p><img src="media/bob.jfif" alt="스폰지밥" class="rotating-image"></p>
    </body>
</html>
