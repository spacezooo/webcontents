<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>전환</title>
        <style>
            .rotating-image {
                width: 150px;
                height: 150px;
                transition: width 2s; 
            }
            
            .rotating-image:hover {
                width: 100%;
            }
        </style>
    </head>
    <body>
        <h3>마우스를 올려봐요</h3>
        <hr>
        <p><img src="media/bob.jfif" alt="스폰지밥" class="rotating-image"></p>
    </body>
</html>
